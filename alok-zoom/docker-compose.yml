services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      ZOOM_BEARER_TOKEN: ${ZOOM_BEARER_TOKEN}
      ZOOM_ACCOUNT_ID: ${ZOOM_ACCOUNT_ID}
      ZOOM_CLIENT_ID: ${ZOOM_CLIENT_ID}
      ZOOM_CLIENT_SECRET: ${ZOOM_CLIENT_SECRET}
      ZOOM_USER_ID: ${ZOOM_USER_ID}
      TIMEZONE_DEFAULT: ${TIMEZONE_DEFAULT:-Asia/Kolkata}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173}

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    depends_on:
      - backend
